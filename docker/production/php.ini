; Production PHP settings. Distinct from docker/8.3/php.ini, which is tuned for
; Sail development (Xdebug enabled, opcache timestamp validation on).

memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60

; PHP's own error output. Separate from Laravel's APP_DEBUG, and just as
; important to keep off a public site.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

expose_php = Off

; The image is immutable, so opcache never needs to stat files for changes.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
