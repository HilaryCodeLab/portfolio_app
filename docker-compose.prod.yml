# Production stack. Runs alongside the Sail dev stack (docker-compose.yml) on the
# same Pi — separate compose project, separate volumes, no shared state.
#
#   docker compose -f docker-compose.prod.yml -p portfolio-prod up -d
#
# Only app + mysql: composer.json has no laravel/scout and no redis client, so
# Sail's meilisearch, redis and mailpit services are unused here. Cache, queue
# and sessions all resolve to database/file drivers.

name: portfolio-prod

services:
    app:
        image: ${APP_IMAGE:-ghcr.io/hilarycodelab/portfolio_app:latest}
        restart: unless-stopped
        env_file:
            - .env.production
        # No published ports. cloudflared reaches this over the internal network
        # by service name, so the app is not exposed on the Pi's LAN interface.
        expose:
            - '80'
        volumes:
            - 'prod-storage:/var/www/html/storage'
        networks:
            - portfolio-prod
        depends_on:
            mysql:
                condition: service_healthy

    # Cloudflare Tunnel. Makes an OUTBOUND connection to Cloudflare and holds it
    # open, so the app is reachable from the internet with no inbound ports and no
    # router changes. Visitors hit Cloudflare's edge; requests return down this
    # connection to app:80 over the internal network. TUNNEL_TOKEN comes from
    # .env.production and is substituted by `docker compose --env-file`.
    cloudflared:
        image: 'cloudflare/cloudflared:latest'
        restart: unless-stopped
        command: tunnel --no-autoupdate run
        environment:
            TUNNEL_TOKEN: '${TUNNEL_TOKEN}'
        depends_on:
            - app
        networks:
            - portfolio-prod

    # MariaDB rather than MySQL 8: the runtime image is Alpine-based, whose only
    # MySQL-compatible client is mariadb-client. That client cannot authenticate
    # to MySQL 8 (missing caching_sha2_password plugin) nor accept its
    # auto-generated self-signed TLS cert — both of which break `artisan migrate`
    # loading the schema dump. MariaDB pairs cleanly with the client and Laravel
    # treats the two engines identically. The service is still named `mysql` so
    # DB_HOST needs no change. Verified: mysql-schema.sql loads with no edits.
    mysql:
        image: 'mariadb:11'
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: '${DB_DATABASE}'
            MARIADB_USER: '${DB_USERNAME}'
            MARIADB_PASSWORD: '${DB_PASSWORD}'
            MARIADB_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            # No MARIADB_ALLOW_EMPTY_ROOT_PASSWORD and no wildcard root host —
            # the dev compose file is looser; neither belongs in production.
        # Not published either: only the app container needs the database.
        expose:
            - '3306'
        volumes:
            - 'prod-mysql:/var/lib/mysql'
        networks:
            - portfolio-prod
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

networks:
    portfolio-prod:
        driver: bridge

volumes:
    prod-mysql:
        driver: local
    prod-storage:
        driver: local
